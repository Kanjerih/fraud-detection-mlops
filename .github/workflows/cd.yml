name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull data with DVC
        run: |
          pip install dvc
          dvc pull || echo "No DVC remote configured yet — skipping pull"

      - name: Fetch data from Kaggle (fallback if DVC has no data yet)
        if: hashFiles('data/raw/creditcard.csv') == ''
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: python -m src.data.fetch_data

      - name: Re-run training quality gate before deploy
        run: python -m src.models.train

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render deploy
        run: |
          curl -X POST "https://api.render.com/deploy/${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_DEPLOY_KEY }}"
        # Render's deploy hook URL (Settings > Deploy Hook on the service)
        # is stored as two repo secrets: RENDER_SERVICE_ID and RENDER_DEPLOY_KEY.
        # Render also supports autoDeploy from GitHub directly (see render.yaml),
        # so this step is optional if autoDeploy: true is sufficient for your workflow.
