name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check src tests

      - name: Check formatting with black
        run: black --check src tests

      - name: Run unit tests with coverage
        run: pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  validate-training-pipeline:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull data with DVC
        run: |
          pip install dvc
          dvc pull || echo "No DVC remote configured yet — skipping pull"

      - name: Fetch data from Kaggle (fallback if DVC has no data yet)
        if: hashFiles('data/raw/creditcard.csv') == ''
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: python -m src.data.fetch_data

      - name: Run training pipeline (quality gate)
        run: python -m src.models.train
        continue-on-error: false
        # Non-zero exit here (model fails the metric gate defined in
        # src/config.py) fails this job and blocks deployment.

      - name: Upload trained model artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/model.joblib
